
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }
        .btn{
    display:inline-block;
    margin:10px 5px;
    padding:10px 20px;
    background:#4CAF50;
    color:white;
    text-decoration:none;
    border-radius:5px;
}
  


        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .profile-container{
            width:400px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            text-align:center;
        }

        .profile-pic{
            width:150px;
            height:150px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #4CAF50;
            margin-bottom:20px;
        }

        .default-pic{
            width:150px;
            height:150px;
            border-radius:50%;
            background:#ddd;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:0 auto 20px;
            font-size:50px;
            color:#666;
        }

        h2{
            color:#333;
            margin-bottom:20px;
        }

        .info{
            text-align:left;
            margin-top:20px;
        }

        .info p{
            padding:10px;
            border-bottom:1px solid #eee;
            font-size:16px;
        }

        .info strong{
            color:#444;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#4CAF50;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .btn:hover{
            background:#45a049;
        }
    </style>
</head>
<body>

<div class="profile-container">

    {% if user.profile_pic %}
        <img src="{{ user.profile_pic.url }}" 
             alt="Profile Picture" 
             class="profile-pic">
    {% else %}
        <div class="default-pic">
            👤
        </div>
    {% endif %}

    <h2>User Profile</h2>

    <div class="info">
        <p><strong>Name:</strong> {{ user.name }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
    </div>

    <a href="{% url 'home' %}" class="btn">Back to Home</a>
    <a href="{% url 'edit_profile' user.id %}" class="btn">Edit Profile</a>
</div>

</body>
</html>
