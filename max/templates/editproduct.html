<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 450px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h2 {
            text-align: center;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: orange;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: darkorange;
        }

        img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Edit Product</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Product Name</label>
        <input type="text" 
       name="product_name" 
       value="{{ product.product_name }}">

        <label>Description</label>
        <textarea
            name="description"
            rows="4"
            required
        >{{ product.description }}</textarea>

        <label>Price</label>
        <input
            type="number"
            name="price"
            value="{{ product.price }}"
            required
        >

        {% if product.product_image %}
            <label>Current Image</label>
            <img src="{{ product.product_image.url }}" alt="Product Image">
        {% endif %}

        <label>Change Image</label>
        <input
            type="file"
            name="product_image"
        >

        <label>Stock</label>
        <input
            type="number"
            name="stock"
            value="{{ product.stock }}"
            required
        >

        <button type="submit">
            Update Product
        </button>

    </form>

</div>

</body>
</html>
